<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deputados - De Olho na Câmara</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Parse SDK -->
    <script src="https://npmcdn.com/parse/dist/parse.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="flex h-screen bg-gray-100 font-sans antialiased overflow-hidden">
    
    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col shadow-2xl shrink-0">
        <div class="p-6 flex items-center gap-3 cursor-pointer" onclick="window.location.href='../index.html'">
            <i class="fa-solid fa-eye text-3xl text-teal-400"></i>
            <h1 class="text-2xl font-bold tracking-wider">De olho na<br><span class="text-teal-400">câmara</span></h1>
        </div>
        
        <nav class="flex-1 px-4 mt-6 space-y-3 overflow-y-auto">
            <a href="dashboard.html" class="flex items-center gap-4 px-5 py-3 rounded-2xl text-gray-400 transition-colors hover:bg-teal-800 hover:text-white">
                <i class="fa-solid fa-chart-line text-xl"></i>
                <span class="text-lg font-medium">Dashboard</span>
            </a>
            <a href="deputados.html" class="flex items-center gap-4 px-5 py-3 bg-teal-800 rounded-2xl text-green-400 transition-colors">
                <i class="fa-solid fa-users text-xl"></i>
                <span class="text-lg font-medium">Deputados</span>
            </a>
            <a href="meu-radar.html" class="flex items-center gap-4 px-5 py-3 rounded-2xl text-gray-400 transition-colors hover:bg-teal-800 hover:text-white">
                <i class="fa-solid fa-satellite-dish text-xl"></i>
                <span class="text-lg font-medium">Meu Radar</span>
            </a>
            <a href="partidos.html" class="flex items-center gap-4 px-5 py-3 rounded-2xl text-gray-400 transition-colors hover:bg-teal-800 hover:text-white">
                <i class="fa-solid fa-handshake text-xl"></i>
                <span class="text-lg font-medium">Partidos</span>
            </a>
            <a href="radar-anomalias.html" class="flex items-center gap-4 px-5 py-3 rounded-2xl text-gray-400 transition-colors hover:bg-teal-800 hover:text-white">
                <i class="fa-solid fa-triangle-exclamation text-xl"></i>
                <span class="text-lg font-medium">Alertas de Risco</span>
            </a>
            <a href="comparador.html" class="flex items-center gap-4 px-5 py-3 rounded-2xl text-gray-400 transition-colors hover:bg-teal-800 hover:text-white">
                <i class="fa-solid fa-code-compare text-xl"></i>
                <span class="text-lg font-medium">Comparador</span>
            </a>
            <a href="bussola.html" class="flex items-center gap-4 px-5 py-3 rounded-2xl text-gray-400 transition-colors hover:bg-teal-800 hover:text-white">
                <i class="fa-solid fa-compass text-xl"></i>
                <span class="text-lg font-medium">Bússola Ideológica</span>
            </a>
        </nav>
        
        <div class="p-4 border-t border-gray-800 text-sm text-gray-500">
            <p>Usuário:</p>
            <p id="session-display" class="truncate text-gray-400 font-medium text-xs">Não logado</p>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col overflow-y-auto">
        
        <!-- Header -->
        <header class="bg-white shadow-sm border-b border-gray-200 px-10 py-6 flex items-center justify-between relative shrink-0">
            <div>
                <h2 class="text-2xl font-extrabold text-gray-900 tracking-tight flex items-center gap-2">
                    <i class="fa-solid fa-users text-blue-500"></i> Galeria de Deputados
                </h2>
                <p class="text-sm text-gray-500 mt-1">Busque, filtre e explore todos os 513 deputados federais ativos.</p>
            </div>

            <!-- Auth Buttons -->
            <div class="absolute top-4 right-8 flex items-center gap-4">
                <span id="user-display" class="hidden text-gray-700 font-medium"></span>
                <button id="btn-login-modal" class="bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-full font-medium transition-colors">Entrar / Cadastrar</button>
                <button id="btn-logout" class="hidden text-gray-500 hover:text-red-500 font-medium transition-colors">Sair</button>
            </div>
        </header>

        <!-- Filters Section -->
        <section class="bg-white border-b border-gray-200 px-10 py-5">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <!-- Search Input -->
                <div class="relative">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nome do Parlamentar</label>
                    <div class="relative">
                        <input type="text" id="filtro-nome" placeholder="Ex: Abilio..." class="w-full pl-9 pr-4 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400 text-sm"></i>
                    </div>
                </div>

                <!-- UF Filter -->
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Estado (UF)</label>
                    <select id="filtro-uf" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                        <option value="">Todos os Estados</option>
                        <option value="AC">Acre</option>
                        <option value="AL">Alagoas</option>
                        <option value="AM">Amazonas</option>
                        <option value="AP">Amapá</option>
                        <option value="BA">Bahia</option>
                        <option value="CE">Ceará</option>
                        <option value="DF">Distrito Federal</option>
                        <option value="ES">Espírito Santo</option>
                        <option value="GO">Goiás</option>
                        <option value="MA">Maranhão</option>
                        <option value="MG">Minas Gerais</option>
                        <option value="MS">Mato Grosso do Sul</option>
                        <option value="MT">Mato Grosso</option>
                        <option value="PA">Pará</option>
                        <option value="PB">Paraíba</option>
                        <option value="PE">Pernambuco</option>
                        <option value="PI">Piauí</option>
                        <option value="PR">Paraná</option>
                        <option value="RJ">Rio de Janeiro</option>
                        <option value="RN">Rio Grande do Norte</option>
                        <option value="RO">Rondônia</option>
                        <option value="RR">Roraima</option>
                        <option value="RS">Rio Grande do Sul</option>
                        <option value="SC">Santa Catarina</option>
                        <option value="SE">Sergipe</option>
                        <option value="SP">São Paulo</option>
                        <option value="TO">Tocantins</option>
                    </select>
                </div>

                <!-- Partido Filter -->
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Partido Político</label>
                    <select id="filtro-partido" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                        <option value="">Todos os Partidos</option>
                        <!-- Injetado dinamicamente -->
                    </select>
                </div>

                <!-- Ordenação -->
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Ordenar por</label>
                    <select id="ordenar-por" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                        <option value="nome">Nome (A-Z)</option>
                        <option value="siglaPartido">Partido</option>
                        <option value="siglaUf">Estado</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- Gallery / Grid -->
        <section class="p-10 flex-1 flex flex-col justify-between">
            <div id="deputados-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                <!-- Cards injetados via JS -->
            </div>

            <!-- Pagination -->
            <div class="mt-10 flex flex-col sm:flex-row items-center justify-between border-t border-gray-200 pt-6 gap-4">
                <p id="paginacao-info" class="text-sm text-gray-500 font-medium">Exibindo registros...</p>
                <div class="flex items-center gap-2">
                    <button id="btn-pag-anterior" class="px-4 py-2 border border-gray-300 bg-white hover:bg-gray-50 text-gray-700 rounded-lg text-sm font-semibold transition disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fa-solid fa-chevron-left mr-1"></i> Anterior
                    </button>
                    <button id="btn-pag-proxima" class="px-4 py-2 border border-gray-300 bg-white hover:bg-gray-50 text-gray-700 rounded-lg text-sm font-semibold transition disabled:opacity-50 disabled:cursor-not-allowed">
                        Próxima <i class="fa-solid fa-chevron-right ml-1"></i>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <!-- Login/Register Modal -->
    <div id="auth-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center backdrop-blur-sm transition-opacity duration-300">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-96 max-w-full">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-gray-900">Acesso</h3>
                <button id="close-modal" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <form id="auth-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email / Usuário</label>
                    <input type="text" id="auth-email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                    <input type="password" id="auth-password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
                <div id="auth-error" class="hidden text-red-500 text-sm font-medium"></div>
                <div class="pt-2 flex gap-3">
                    <button type="button" id="btn-login" class="flex-1 bg-teal-700 hover:bg-teal-800 text-white py-3 rounded-2xl font-medium transition-colors">Login</button>
                    <button type="button" id="btn-signup" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-3 rounded-2xl font-medium transition-colors">Criar Conta</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Rating Modal -->
    <div id="avaliacao-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center backdrop-blur-sm transition-opacity duration-300">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-96 max-w-full">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-gray-900">Avaliar Deputado</h3>
                <button id="close-avaliacao-modal" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <p id="avaliacao-deputado-nome" class="text-center font-semibold text-gray-700 mb-6 text-lg"></p>

            <div class="flex justify-center gap-2 mb-6" id="estrelas-container">
                <button class="estrela-btn text-gray-300 hover:text-yellow-400 text-3xl transition-colors" data-nota="1"><i class="fa-solid fa-star"></i></button>
                <button class="estrela-btn text-gray-300 hover:text-yellow-400 text-3xl transition-colors" data-nota="2"><i class="fa-solid fa-star"></i></button>
                <button class="estrela-btn text-gray-300 hover:text-yellow-400 text-3xl transition-colors" data-nota="3"><i class="fa-solid fa-star"></i></button>
                <button class="estrela-btn text-gray-300 hover:text-yellow-400 text-3xl transition-colors" data-nota="4"><i class="fa-solid fa-star"></i></button>
                <button class="estrela-btn text-gray-300 hover:text-yellow-400 text-3xl transition-colors" data-nota="5"><i class="fa-solid fa-star"></i></button>
            </div>
            
            <p id="avaliacao-nota-selecionada" class="text-center text-sm text-gray-500 mb-4 h-5"></p>

            <div class="mb-5">
                <label for="avaliacao-comentario" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Anotação (Opcional):</label>
                <textarea id="avaliacao-comentario" rows="3" class="w-full px-4 py-2 text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all resize-none text-gray-700" placeholder="Digite aqui uma observação ou anotação sobre o deputado..."></textarea>
            </div>

            <button type="button" id="btn-confirmar-avaliacao" class="w-full bg-teal-700 hover:bg-teal-800 text-white py-3 rounded-2xl font-bold transition-colors">Confirmar Avaliação</button>
        </div>
    </div>

    <!-- Logic and config files -->
    <script src="../assets/js/core/config.js"></script>
    <script src="../assets/js/services/back4app.js"></script>
    <script src="../assets/js/services/cache.js"></script>
    <script src="../assets/js/services/camaraApi.js"></script>
    
    <script src="../assets/js/models/DeputadoModel.js"></script>
    <script src="../assets/js/models/MonitoramentoModel.js"></script>
    <script src="../assets/js/models/AvaliacaoModel.js"></script>
    
    <script src="../assets/js/core/app.js"></script>
    
    <script src="../assets/js/views/DeputadosView.js"></script>
    <script src="../assets/js/controllers/DeputadosController.js"></script>
</body>
</html>

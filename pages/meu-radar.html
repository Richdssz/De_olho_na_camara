<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Radar - De Olho na Câmara</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Parse SDK -->
    <script src="https://npmcdn.com/parse/dist/parse.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex overflow-hidden">
    
    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col shadow-2xl shrink-0">
        <div class="p-6 flex items-center gap-3 cursor-pointer" onclick="window.location.href='../index.html'">
            <i class="fa-solid fa-eye text-3xl text-teal-400"></i>
            <h1 class="text-2xl font-bold tracking-wider">De olho na<br><span class="text-teal-400">câmara</span></h1>
        </div>
        
        <nav class="flex-1 px-4 mt-6 space-y-3">
            <a href="dashboard.html" class="flex items-center gap-4 px-5 py-3 rounded-2xl text-gray-400 transition-colors hover:bg-teal-800 hover:text-white">
                <i class="fa-solid fa-chart-line text-xl"></i>
                <span class="text-lg font-medium">Dashboard</span>
            </a>
            <a href="deputados.html" class="flex items-center gap-4 px-5 py-3 rounded-2xl text-gray-400 transition-colors hover:bg-teal-800 hover:text-white">
                <i class="fa-solid fa-users text-xl"></i>
                <span class="text-lg font-medium">Deputados</span>
            </a>
            <a href="meu-radar.html" class="flex items-center gap-4 px-5 py-3 bg-teal-800 rounded-2xl text-green-400 transition-colors">
                <i class="fa-solid fa-satellite-dish text-xl"></i>
                <span class="text-lg font-medium">Meu Radar</span>
            </a>
            <a href="partidos.html" class="flex items-center gap-4 px-5 py-3 rounded-2xl text-gray-400 transition-colors hover:bg-teal-800 hover:text-white">
                <i class="fa-solid fa-handshake text-xl"></i>
                <span class="text-lg font-medium">Partidos</span>
            </a>
            <a href="radar-anomalias.html" class="flex items-center gap-4 px-5 py-3 rounded-2xl text-gray-400 transition-colors hover:bg-teal-800 hover:text-white">
                <i class="fa-solid fa-triangle-exclamation text-xl"></i>
                <span class="text-lg font-medium">Alertas de Risco</span>
            </a>
            <a href="comparador.html" class="flex items-center gap-4 px-5 py-3 rounded-2xl text-gray-400 transition-colors hover:bg-teal-800 hover:text-white">
                <i class="fa-solid fa-code-compare text-xl"></i>
                <span class="text-lg font-medium">Comparador</span>
            </a>
            <a href="espectro.html" class="flex items-center gap-4 px-5 py-3 rounded-2xl text-gray-400 transition-colors hover:bg-teal-800 hover:text-white">
                <i class="fa-solid fa-compass text-xl"></i>
                <span class="text-lg font-medium">Espectro</span>
            </a>
        </nav>
        
        <div class="p-4 border-t border-gray-800">
            <div class="bg-gray-800 p-4 rounded-xl">
                <p class="text-xs text-gray-400 mb-2">Dados oficiais abertos</p>
                <a href="https://dadosabertos.camara.leg.br/" target="_blank" class="text-sm font-semibold text-teal-400 hover:text-teal-300 flex items-center gap-2">
                    API da Câmara <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
                </a>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#f3f4f6]">
        
        <!-- Header -->
        <header class="bg-white shadow-sm border-b border-gray-100 py-4 px-8 flex justify-between items-center shrink-0">
            <div>
                <h2 class="text-2xl font-bold text-gray-900">Seu Radar</h2>
                <p class="text-sm text-gray-500">Deputados que você está acompanhando de perto</p>
            </div>

            <!-- Auth Buttons -->
            <div class="flex items-center gap-4">
                <span id="user-display" class="hidden text-gray-700 font-medium"></span>
                <button id="btn-login-modal" class="bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-full font-medium transition-colors">Entrar / Cadastrar</button>
                <button id="btn-logout" class="hidden text-gray-500 hover:text-red-500 font-medium transition-colors">Sair</button>
            </div>
        </header>

        <!-- Content Area (Scrollable) -->
        <div class="flex-1 overflow-y-auto p-8 relative">
            <div class="max-w-7xl mx-auto">
                
                <!-- Grade de Deputados Monitorados -->
                <div id="radar-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    <!-- Cards de deputados injetados aqui -->
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Base (Importado via app.js) -->
    <div id="auth-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden transform scale-95 transition-transform duration-300">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                <h3 class="text-xl font-bold text-gray-900">Acesso ao Painel</h3>
                <button id="close-modal" class="text-gray-400 hover:text-gray-600">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <form id="auth-form" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                    <input type="email" id="auth-email" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                    <input type="password" id="auth-password" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition-all">
                </div>
                <div id="auth-error" class="hidden text-red-500 text-sm font-medium"></div>
                <div class="pt-2 flex gap-3">
                    <button type="button" id="btn-login" class="flex-1 bg-teal-700 hover:bg-teal-800 text-white py-3 rounded-2xl font-medium transition-colors">Login</button>
                    <button type="button" id="btn-signup" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-3 rounded-2xl font-medium transition-colors">Criar Conta</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts MVC -->
    <script src="../assets/js/core/config.js"></script>
    <script src="../assets/js/services/back4app.js"></script>
    <script src="../assets/js/services/cache.js"></script>
    <script src="../assets/js/services/camaraApi.js"></script>
    <script src="../assets/js/services/analytics.js"></script>
    
    <script src="../assets/js/models/DeputadoModel.js"></script>
    <script src="../assets/js/models/MonitoramentoModel.js"></script>
    
    <script src="../assets/js/core/app.js"></script>
    
    <script src="../assets/js/views/MeuRadarView.js"></script>
    <script src="../assets/js/controllers/MeuRadarController.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De olho na câmara</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Parse SDK (Back4App) -->
    <script src="https://npmcdn.com/parse/dist/parse.min.js"></script>
</head>
<body class="flex h-screen bg-gray-100 font-sans antialiased">
    
    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col shadow-2xl">
        <div class="p-6 flex items-center gap-3">
            <i class="fa-solid fa-eye text-2xl text-blue-400"></i>
            <h1 class="text-xl font-bold tracking-wider">De olho na<br><span class="text-blue-400">câmara</span></h1>
        </div>
        
        <nav class="flex-1 px-4 mt-6 space-y-2">
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-gray-800 rounded-lg text-blue-400 transition-colors hover:bg-gray-800">
                <i class="fa-solid fa-chart-line"></i>
                <span class="font-medium">Dashboard</span>
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 transition-colors hover:bg-gray-800 hover:text-white">
                <i class="fa-solid fa-users"></i>
                <span class="font-medium">Deputados</span>
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 transition-colors hover:bg-gray-800 hover:text-white">
                <i class="fa-solid fa-radar"></i>
                <span class="font-medium">Meu Radar</span>
            </a>
        </nav>
        
        <div class="p-4 border-t border-gray-800 text-sm text-gray-500">
            <p>Usuário:</p>
            <p id="session-display" class="truncate text-gray-400 font-medium text-xs"></p>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-y-auto">
        
        <!-- Header / Hero Section -->
        <header class="bg-white shadow-sm border-b border-gray-200 px-10 py-12 relative">
            <!-- Auth Panel -->
            <div class="absolute top-4 right-8 flex items-center gap-4">
                <span id="user-display" class="hidden text-gray-700 font-medium"></span>
                <button id="btn-login-modal" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors">Entrar / Cadastrar</button>
                <button id="btn-logout" class="hidden text-gray-500 hover:text-red-500 font-medium transition-colors">Sair</button>
            </div>
            
            <div class="max-w-4xl">
                <h2 class="text-4xl font-extrabold text-gray-900 mb-4 tracking-tight">
                    Acompanhe como o seu dinheiro está sendo gasto no Plenário.
                </h2>
                <p class="text-lg text-gray-600">
                    Dados abertos em tempo real para um controle social efetivo e transparente.
                </p>
            </div>
        </header>

        <!-- Dashboard Area -->
        <section class="p-10 max-w-7xl mx-auto w-full">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h3 class="text-2xl font-bold text-gray-900 tracking-tight">Deputados em Destaque</h3>
                    <p class="text-gray-500 mt-1">Conheça, acompanhe e avalie seus representantes</p>
                </div>
            </div>
            
            <!-- Grid de Deputados -->
            <div id="deputados-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                <!-- Cards injetados via JS -->
            </div>
        </section>
        
    </main>

    <!-- Login/Register Modal -->
    <div id="auth-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-96 max-w-full">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-gray-900">Acesso</h3>
                <button id="close-modal" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <form id="auth-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email / Usuário</label>
                    <input type="text" id="auth-email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                    <input type="password" id="auth-password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
                <div id="auth-error" class="hidden text-red-500 text-sm font-medium"></div>
                <div class="pt-2 flex gap-3">
                    <button type="button" id="btn-login" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-medium transition-colors">Login</button>
                    <button type="button" id="btn-signup" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg font-medium transition-colors">Criar Conta</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Nosso Motor Lógico e Variáveis de Ambiente -->
    <script src=".env"></script>
    <script src="js/app.js"></script>
</body>
</html>
